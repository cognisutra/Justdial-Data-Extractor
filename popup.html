<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JustDial Data Extractor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>JustDial Data Extractor</h1>
      <p class="subtitle">Scrape business listings in seconds</p>
    </header>

    <div class="stats">
      <div class="stat-card">
        <span class="stat-label">Records</span>
        <span id="recordCount" class="stat-value">0</span>
      </div>
    </div>

    <div class="actions">
      <button id="extractBtn" class="btn btn-primary">⚡ Extract Data</button>
    </div>

    <div id="status" class="status hidden"></div>

    <!-- Preview Table -->
    <div id="previewSection" class="preview-section hidden">
      <div class="preview-header">
        <span class="preview-title">Preview</span>
        <span id="previewCount" class="preview-count"></span>
      </div>
      <div class="table-wrap">
        <table id="previewTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Business Name</th>
              <th>Phone</th>
              <th>Location</th>
              <th>Category</th>
            </tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Export Buttons -->
    <div id="exportSection" class="export-section hidden">
      <p class="export-label">Export as</p>
      <div class="export-row">
        <button id="downloadCSV"  class="btn btn-export">📄 CSV</button>
        <button id="downloadJSON" class="btn btn-export">📦 JSON</button>
        <button id="downloadTSV"  class="btn btn-export">📊 Excel/TSV</button>
        <button id="downloadHTML" class="btn btn-export">🌐 HTML</button>
      </div>
      <button id="clearBtn" class="btn btn-ghost">🗑 Clear Data</button>
    </div>

    <footer>
      <small>Open a JustDial search page, then click Extract.</small>
      <div class="credit">
        Made with ❤️ by <a href="https://cognisutra.in" target="_blank">cognisutra.in</a>
      </div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
